name: Atualizar Orcamento Conjunto
on:
  workflow_dispatch:
    inputs:
      adset_id:
        description: 'Adset ID'
        required: true
        default: '120248610894970581'
      add_cents:
        description: 'Valor a adicionar em centavos (4000 = R$40)'
        required: true
        default: '4000'
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Update adset budget
        env:
          TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          ADSET_ID: ${{ github.event.inputs.adset_id }}
          ADD_CENTS: ${{ github.event.inputs.add_cents }}
        run: |
          pip install requests -q
          python3 -c "
import requests, os, json
TOKEN=os.environ['TOKEN']; BASE='https://graph.facebook.com/v19.0'
ADSET_ID=os.environ['ADSET_ID']; ADD_CENTS=int(os.environ['ADD_CENTS'])
r=requests.get(f'{BASE}/{ADSET_ID}',params={'fields':'id,name,daily_budget,effective_status','access_token':TOKEN})
data=r.json(); print('GET:',json.dumps(data,indent=2))
if 'error' in data: print('ERR:',data['error']['message']); exit(1)
cur=int(data.get('daily_budget',0)); nb=cur+ADD_CENTS
print(f'R\${cur/100:.2f} -> R\${nb/100:.2f}')
u=requests.post(f'{BASE}/{ADSET_ID}',data={'daily_budget':nb,'access_token':TOKEN})
print('POST:',u.text)
"
