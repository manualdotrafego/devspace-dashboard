name: Update Adset Budget
on:
  workflow_dispatch:
    inputs:
      adset_id:
        description: 'Adset ID'
        required: true
        default: '120248610894970581'
      add_amount_cents:
        description: 'Amount to add in cents (e.g. 4000 = R$40)'
        required: true
        default: '4000'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check and update budget
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: |
          pip install requests -q
          python3 - << 'PYEOF'
import requests, os, json

TOKEN = os.environ['META_ACCESS_TOKEN']
BASE  = "https://graph.facebook.com/v19.0"
ADSET_ID = "${{ github.event.inputs.adset_id }}"
ADD_CENTS = int("${{ github.event.inputs.add_amount_cents }}")

# Get current budget
r = requests.get(f"{BASE}/{ADSET_ID}", params={
    'fields': 'id,name,daily_budget,lifetime_budget,effective_status',
    'access_token': TOKEN
})
data = r.json()
print("Current:", json.dumps(data, indent=2))

if 'error' in data:
    print("ERROR:", data['error']['message'])
    exit(1)

# Calculate new budget
current = int(data.get('daily_budget', 0))
new_budget = current + ADD_CENTS
print(f"Budget: R${current/100:.2f} -> R${new_budget/100:.2f} (+R${ADD_CENTS/100:.2f})")

# Update
u = requests.post(f"{BASE}/{ADSET_ID}", data={
    'daily_budget': new_budget,
    'access_token': TOKEN
})
print("Update response:", u.text)
PYEOF
