name: Update DevSpace Dashboard
on:
  schedule:
    - cron: '0 */8 * * *'   # a cada 8 horas (0h, 8h, 16h UTC)
  workflow_dispatch:          # disparo manual
jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Fetch Meta data
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: python scripts/fetch_devspace_dashboard.py
      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/thumbnails/ 2>/dev/null || true
          git diff --staged --quiet && echo "Sem alteracoes" && exit 0
          git commit -m "chore: atualiza dashboard $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          git push
