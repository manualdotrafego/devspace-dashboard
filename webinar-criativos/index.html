const eur = v => '€'+v.toFixed(2).replace('.',',');
const app = document.getElementById('app');
DATA.forEach((cy,idx)=>{
  const cards = cy.creatives.map(c=>{
    const cplBad = c.cpl && c.cpl>6;
    const thumb = c.img ? `<img class="thumb" src="${c.img}" loading="lazy">` : `<div class="nothumb">sem thumb</div>`;
    const badge = c.leads>=10 ? `<div class="badge">${c.leads} leads</div>` : '';
    const cplCell = c.cpl!=null ? `<div class="m cpl ${cplBad?'bad':''}"><div class="v">${eur(c.cpl)}</div><div class="l">CPL</div></div>` : `<div class="m cpl"><div class="v">—</div><div class="l">CPL</div></div>`;
    const prev = c.post ? `<a class="prev" href="${c.post}" target="_blank">🔗 Ver prévia</a>` : `<span class="prev off">sem prévia</span>`;
    return `<div class="card"><div class="cardwrap">${thumb}${badge}</div><div class="cardb">
      <div class="cname" title="${c.name}">${c.name}</div>
      <div class="metrics">
        <div class="m lead"><div class="v">${c.leads}</div><div class="l">Leads</div></div>
        ${cplCell}
        <div class="m"><div class="v">${eur(c.spend)}</div><div class="l">Gasto</div></div>
        <div class="m"><div class="v">${c.ctr.toFixed(2)}%</div><div class="l">CTR</div></div>
      </div>${prev}</div></div>`;
  }).join('');
  const open = idx>=DATA.length-2 ? 'open' : '';
  app.insertAdjacentHTML('beforeend', `<div class="cycle ${open}">
    <div class="chead" onclick="this.parentNode.classList.toggle('open')">
      <div class="cnum"><small>CICLO</small>${cy.num}</div>
      <div class="cper">${cy.period}<small>${cy.n} criativos</small></div>
      <div class="cstats">
        <div class="cstat"><div class="v">${eur(cy.spend)}</div><div class="l">Gasto</div></div>
        <div class="cstat"><div class="v y">${cy.leads}</div><div class="l">Leads</div></div>
        <div class="cstat"><div class="v g">${eur(cy.cpl)}</div><div class="l">CPL</div></div>
        <div class="cstat"><div class="v">${cy.conv.toFixed(1)}%</div><div class="l">Conv</div></div>
        <span class="arrow">▶</span>
      </div>
    </div>
    <div class="cbody"><div class="grid">${cards}</div></div>
  </div>`);
});
